services:
  kafka:
    image: apache/kafka:3.8.0
    container_name: factory-kafka
    ports:
      # 컨테이너 밖(호스트)에서 kafka-console-consumer 등으로 확인할 때 쓰는 외부 리스너.
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # LISTENERS 3개:
      #  - INTERNAL(kafka:9092)    : 같은 docker network 안(kafka-ui 등)에서 접속하는 용도
      #  - CONTROLLER(9093)        : KRaft 컨트롤러 간 통신 전용
      #  - EXTERNAL(localhost:9094): 호스트(윈도우)에서 kafka-console-consumer 등으로 접속하는 용도
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: factory-kafka-ui
    ports:
      # 브라우저에서 http://localhost:8080 으로 접속해서 토픽/메시지 흐름을 확인.
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: factory
      # 같은 docker network 안에서 접속하므로 내부 리스너(kafka:9092)를 쓴다.
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: factory-timescaledb
    ports:
      # 호스트(윈도우)에서 psql/JDBC로 접속할 때 쓰는 포트.
      - "5432:5432"
    environment:
      POSTGRES_USER: factory
      POSTGRES_PASSWORD: factory
      POSTGRES_DB: factory
    volumes:
      - timescale-data:/var/lib/postgresql/data

  adminer:
    image: adminer:latest
    container_name: factory-adminer
    ports:
      # 브라우저에서 http://localhost:8082 로 접속해서 TimescaleDB 데이터를 확인.
      - "8082:8080"
    environment:
      ADMINER_DEFAULT_SERVER: timescaledb
    depends_on:
      - timescaledb

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: factory-kafka-exporter
    # Kafka UI가 보여주는 것(토픽 offset, 컨슈머 그룹 랙)과 같은 걸 Prometheus 메트릭으로
    # 뽑아내는 역할. AdminClient/Consumer API로 Kafka에 직접 붙는 것뿐이라 브로커 쪽 설정은
    # 하나도 안 건드린다.
    command: ["--kafka.server=kafka:9092"]
    ports:
      # 디버깅용 - 브라우저/curl로 http://localhost:9308/metrics 직접 확인 가능.
      - "9308:9308"
    depends_on:
      - kafka

  prometheus:
    image: prom/prometheus:latest
    container_name: factory-prometheus
    ports:
      # 브라우저에서 http://localhost:9090 으로 접속해서 raw 메트릭/쿼리를 직접 확인 가능.
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - kafka-exporter

  grafana:
    image: grafana/grafana:11.3.0
    container_name: factory-grafana
    ports:
      # 브라우저에서 http://localhost:3000 (기본 로그인 admin/admin).
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - timescaledb

volumes:
  kafka-data:
  timescale-data:
  grafana-data:
